---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kolmafia
  labels:
    app: kolmafia
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: traefik-oauth2-proxy-chain@kubernetescrd
    hajimari.io/enable: "true"
    hajimari.io/icon: "desktop-classic"


spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - kol.kblb.io
      secretName: my-certs-kolmafia
  rules:
    - host: kol.kblb.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kolmafia
                port:
                  name: http
