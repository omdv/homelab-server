---
hajimari:
  image:
    repository: ghcr.io/toboshii/hajimari
    pullPolicy: IfNotPresent
    tag: v0.2.0

  env:
    TZ: America/Chicago

  hajimari:
    defaultEnable: false # show all ingresses, regardless of annotation
    namespaceSelector:
      any: true
    name: "omdv"
    groups:
      - name: Local
        links:
          - name: Netdata
            url: "http://192.168.1.24:19999"
          - name: Portainer
            url: "http://192.168.1.24:8001"
      - name: Dev
        links:
          - name: Codepen
            url: "https://codepen.io/"
          - name: Devdocs
            url: "https://devdocs.io"
          - name: Devhints
            url: "https://devhints.io"

  service:
    main:
      ports:
        http:
          port: 3000

  serviceAccount:
    create: true

  ingress:
    main:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: hj.kblb.io
          paths:
            - path: /
              pathType: Prefix
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: networking-oauth2-proxy-chain@kubernetescrd
      tls:
        - hosts:
            - hj.kblb.io
          secretName: my-certs-hajimari

  persistence:
    data:
      enabled: false

  resources:
    requests:
      cpu: 6m
      memory: 32Mi
    limits:
      cpu: 12m
      memory: 64Mi
