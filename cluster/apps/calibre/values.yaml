---
calibre:
  image:
    repository: linuxserver/calibre
    tag: version-v5.21.0
    pullPolicy: IfNotPresent
  env:
    TZ: "America/Chicago"
    PUID: "1000"
    PGID: "1000"
  service:
    main:
      ports:
        http:
          port: 8080
    webserver:
      enabled: false
      type: ClusterIP
      ports:
        webserver:
          enabled: true
          port: 8081
          protocol: TCP
          targetPort: 8081
  ingress:
    main:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: calibre.kblb.io
          paths:
            - path: /
              pathType: Prefix
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: traefik-oauth2-proxy-chain@kubernetescrd
        hajimari.io/enable: "true"
        hajimari.io/icon: "book-edit"
      tls:
        - hosts:
            - calibre.kblb.io
          secretName: my-certs-calibre
  persistence:
    config:
      enabled: true
      existingClaim: pvc-calibre
  resources:
    requests:
      memory: 16Mi
      cpu: "0.01"
    limits:
      memory: 256Mi
