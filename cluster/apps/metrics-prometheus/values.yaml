# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
---
kube-prometheus-stack:
  fullnameOverride: prom
  prometheus:
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: networking-oauth2-proxy-chain@kubernetescrd
        hajimari.io/enable: "true"
        hajimari.io/appName: "prometheus"
        hajimari.io/icon: "chart-histogram"
      hosts:
        - prometheus.kblb.io
      paths:
        - /
      tls:
        - secretName: my-certs-prometheus
          hosts:
            - prometheus.kblb.io
    prometheusSpec:
      podMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
  kubeStateMetrics:
    enabled: true
  prometheus-node-exporter:
    enabled: true
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  # https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
  grafana:
    enabled: true
    adminPassword: password
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: my-provider
            orgId: 1
            folder: ''
            type: file
            disableDeletion: true
            editable: true
            options:
              path: /var/lib/grafana/dashboards/my-provider
    ingress:
      enabled: true
      ingressClassName: traefik
      path: /
      hosts:
        - metrics.kblb.io
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        hajimari.io/enable: "true"
        traefik.ingress.kubernetes.io/router.middlewares: networking-oauth2-proxy-chain@kubernetescrd
        hajimari.io/appName: "metrics"
        hajimari.io/icon: "chart-box"
      tls:
        - hosts:
            - metrics.kblb.io
          secretName: my-certs-metrics
    persistence:
      enabled: true
      existingClaim: pvc-metrics-grafana
    resources:
      limits:
        cpu: 200m
        memory: 1024Mi
      requests:
        cpu: 100m
        memory: 512Mi
  alertmanager:
    enabled: false
  kubeEtcd:
    enabled: false
