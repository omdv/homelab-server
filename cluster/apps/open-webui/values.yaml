# https://github.com/open-webui/helm-charts/blob/main/charts/open-webui/values.yaml
open-webui:
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: "0.8.12"
  ollama:
    enabled: false

  pipelines:
    enabled: false

  tika:
    enabled: false

  websocket:
    enabled: true
    manager: redis
    url: redis://redis-master.databases.svc.cluster.local:6379/0
    redis:
      enabled: false

  resources: {}

  ingress:
    enabled: true
    class: "traefik"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      traefik.ingress.kubernetes.io/router.middlewares: networking-oauth2-proxy-chain@kubernetescrd
      hajimari.io/enable: "true"
      hajimari.io/icon: "assistant"
      hajimari.io/title: "LLM Chat"
    host: "chat.kblb.io"
    tls: true

  persistence:
    enabled: true
    existingClaim: "pvc-open-webui"

  enableOpenaiApi: true
  openaiBaseApiUrl: "https://openrouter.ai/api/v1"
