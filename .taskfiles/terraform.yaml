---
version: "3"

tasks:
  init:cloudflare:
    desc: Initialize terraform
    dir: infra/cloudflare
    cmds:
      - "terraform init"

  plan:cloudflare:
    desc: Prepare all the k8s nodes for running k3s
    dir: infra/cloudflare
    cmds:
      - "terraform plan"

  apply:cloudflare:
    desc: Prepare all the k8s nodes for running k3s
    dir: infra/cloudflare
    cmds:
      - "terraform apply"
